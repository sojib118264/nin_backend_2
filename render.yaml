services:
  - type: web
    name: nin-api
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "daphne -b 0.0.0.0 -p $PORT ninProject.asgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: ninProject.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: nin-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nin-redis
          property: connectionString

databases:
  - name: nin-db
    plan: free

  - type: redis
    name: nin-redis
    plan: free